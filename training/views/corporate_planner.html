<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training - Planeacion (Corporativo)</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Main -->
    <div class="main-wrap">
      <header class="header" id="header"></header>

      <main class="content">
        <div id="alertBox" class="alert"></div>

        <!-- Create Session Card -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Nueva Sesion de Capacitacion</h2>
          </div>
          <div class="card-body">
            <form id="formSession" autocomplete="off">
              <div class="form-row">
                <div class="form-group">
                  <label for="courseId">Curso</label>
                  <select id="courseId" class="form-control" required>
                    <option value="">Seleccionar curso...</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="sessionDate">Fecha</label>
                  <input type="date" id="sessionDate" class="form-control" required>
                </div>
                <div class="form-group">
                  <label for="locationCode">Lugar</label>
                  <select id="locationCode" class="form-control" required>
                    <option value="">Seleccionar lugar...</option>
                    <option value="1">Lugar 1</option>
                    <option value="2">Lugar 2</option>
                    <option value="3">Lugar 3</option>
                    <option value="4">Lugar 4</option>
                  </select>
                </div>
              </div>
              <button type="submit" class="btn btn-primary">Crear Sesion</button>
            </form>
          </div>
        </div>

        <!-- Sessions List Card -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Sesiones Programadas</h2>
            <button class="btn btn-outline btn-sm" onclick="loadSessions()">Actualizar</button>
          </div>
          <div class="card-body">
            <!-- Filters -->
            <div class="search-bar">
              <div class="form-group" style="min-width:140px;flex:0 0 auto;">
                <label for="filterFrom">Desde</label>
                <input type="date" id="filterFrom" class="form-control">
              </div>
              <div class="form-group" style="min-width:140px;flex:0 0 auto;">
                <label for="filterTo">Hasta</label>
                <input type="date" id="filterTo" class="form-control">
              </div>
              <div class="form-group" style="min-width:140px;flex:0 0 auto;">
                <label for="filterLocation">Lugar</label>
                <select id="filterLocation" class="form-control">
                  <option value="">Todos</option>
                  <option value="1">Lugar 1</option>
                  <option value="2">Lugar 2</option>
                  <option value="3">Lugar 3</option>
                  <option value="4">Lugar 4</option>
                </select>
              </div>
              <div class="form-group" style="min-width:140px;flex:0 0 auto;">
                <label for="filterDealer">Dealer</label>
                <select id="filterDealer" class="form-control">
                  <option value="">Todos</option>
                </select>
              </div>
              <div class="form-group" style="min-width:160px;flex:1;">
                <label for="filterQ">Buscar</label>
                <input type="text" id="filterQ" class="form-control" placeholder="Nombre de curso...">
              </div>
              <button class="btn btn-primary" style="align-self:flex-end;" onclick="loadSessions()">Buscar</button>
            </div>

            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Curso</th>
                    <th>Fecha</th>
                    <th>Lugar</th>
                    <th>Creado por</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="sessionsTable">
                  <tr><td colspan="6" class="empty-state">Cargando...</td></tr>
                </tbody>
              </table>
            </div>
            <div class="pagination" id="sessionsPagination"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Invite Modal -->
  <div class="modal-overlay" id="inviteModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="inviteModalTitle">Invitar Tecnicos</h3>
        <button class="modal-close" onclick="closeModal('inviteModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div id="inviteAlert" class="alert"></div>
        <div class="form-group" style="margin-bottom:12px;">
          <label>Filtrar por dealer</label>
          <select id="inviteDealerFilter" class="form-control" onchange="filterTechniciansForInvite()">
            <option value="">Todos los dealers</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:12px;">
          <label>Buscar tecnico</label>
          <input type="text" id="inviteTechSearch" class="form-control" placeholder="Nombre..." oninput="filterTechniciansForInvite()">
        </div>
        <div class="checkbox-list" id="technicianCheckboxes">
          <!-- Rendered dynamically -->
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('inviteModal')">Cancelar</button>
        <button class="btn btn-primary" id="btnSendInvites" onclick="sendInvites()">Invitar Seleccionados</button>
      </div>
    </div>
  </div>

  <!-- View Invites Modal -->
  <div class="modal-overlay" id="viewInvitesModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="viewInvitesTitle">Tecnicos Invitados</h3>
        <button class="modal-close" onclick="closeModal('viewInvitesModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Tecnico</th>
                <th>Dealer</th>
                <th>Confirmado</th>
                <th>Asistencia</th>
              </tr>
            </thead>
            <tbody id="invitesTable">
            </tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('viewInvitesModal')">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/app.js"></script>
  <script>
    // ── State ──
    let allSessions = [];
    let allTechnicians = [];
    let currentSessionPage = 1;
    let inviteSessionId = null;

    // ── Init ──
    document.addEventListener('DOMContentLoaded', async () => {
      initPage('ADMIN_MASTER', ['Training', 'Planeacion'], 'Admin Corporativo');
      await Promise.all([loadCourses(), loadDealers(), loadTechnicians()]);
      loadSessions();

      document.getElementById('formSession').addEventListener('submit', createSession);
    });

    async function loadCourses() {
      try {
        const courses = await apiGet('courses.php');
        const sel = document.getElementById('courseId');
        courses.forEach(c => {
          sel.appendChild(el('option', { value: c.id, textContent: c.nombre }));
        });
      } catch (e) { console.error(e); }
    }

    async function loadDealers() {
      try {
        const dealers = await apiGet('dealers.php');
        ['filterDealer', 'inviteDealerFilter'].forEach(selId => {
          const sel = document.getElementById(selId);
          dealers.forEach(d => {
            sel.appendChild(el('option', { value: d.id, textContent: d.nombre }));
          });
        });
      } catch (e) { console.error(e); }
    }

    async function loadTechnicians() {
      try {
        allTechnicians = await apiGet('technicians.php');
      } catch (e) { console.error(e); }
    }

    // ── Create session ──
    async function createSession(e) {
      e.preventDefault();
      const courseId = document.getElementById('courseId').value;
      const sessionDate = document.getElementById('sessionDate').value;
      const locationCode = document.getElementById('locationCode').value;

      try {
        await apiPost('sessions.php', { course_id: courseId, session_date: sessionDate, location_code: locationCode });
        showAlert('alertBox', 'Sesion creada correctamente', 'success');
        document.getElementById('formSession').reset();
        loadSessions();
      } catch (err) {
        showAlert('alertBox', err.message, 'danger');
      }
    }

    // ── Load sessions ──
    async function loadSessions() {
      const params = new URLSearchParams();
      const from = document.getElementById('filterFrom').value;
      const to = document.getElementById('filterTo').value;
      const loc = document.getElementById('filterLocation').value;
      const dealer = document.getElementById('filterDealer').value;
      const q = document.getElementById('filterQ').value;
      if (from) params.set('from', from);
      if (to) params.set('to', to);
      if (loc) params.set('location', loc);
      if (dealer) params.set('dealer_id', dealer);
      if (q) params.set('q', q);

      try {
        allSessions = await apiGet(`sessions.php?${params.toString()}`);
        renderSessions(1);
      } catch (err) {
        document.getElementById('sessionsTable').innerHTML = `<tr><td colspan="6" class="empty-state">${err.message}</td></tr>`;
      }
    }

    function renderSessions(page) {
      currentSessionPage = page;
      const { items, totalPages } = paginate(allSessions, page, 10);
      const tbody = document.getElementById('sessionsTable');
      tbody.innerHTML = '';

      if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No se encontraron sesiones</td></tr>';
        document.getElementById('sessionsPagination').innerHTML = '';
        return;
      }

      items.forEach(s => {
        const tr = el('tr', {}, [
          el('td', { textContent: s.id }),
          el('td', { textContent: s.course_name }),
          el('td', { textContent: formatDate(s.session_date) }),
          el('td', { textContent: locationName(s.location_code) }),
          el('td', { textContent: s.created_by_name }),
          el('td', {}, [
            el('button', { className: 'btn btn-sm btn-primary', textContent: 'Invitar', onClick: () => openInviteModal(s.id, s.course_name) }),
            document.createTextNode(' '),
            el('button', { className: 'btn btn-sm btn-outline', textContent: 'Ver Invitados', onClick: () => viewInvites(s.id, s.course_name) }),
          ]),
        ]);
        tbody.appendChild(tr);
      });

      renderPagination('sessionsPagination', totalPages, page, renderSessions);
    }

    // ── Invite Modal ──
    function openInviteModal(sessionId, courseName) {
      inviteSessionId = sessionId;
      document.getElementById('inviteModalTitle').textContent = `Invitar Tecnicos - ${courseName}`;
      document.getElementById('inviteDealerFilter').value = '';
      document.getElementById('inviteTechSearch').value = '';
      filterTechniciansForInvite();
      openModal('inviteModal');
    }

    function filterTechniciansForInvite() {
      const dealerFilter = document.getElementById('inviteDealerFilter').value;
      const search = document.getElementById('inviteTechSearch').value.toLowerCase();
      const container = document.getElementById('technicianCheckboxes');
      container.innerHTML = '';

      let filtered = allTechnicians.filter(t => t.activo == 1);
      if (dealerFilter) filtered = filtered.filter(t => t.dealer_id == dealerFilter);
      if (search) filtered = filtered.filter(t => t.nombre.toLowerCase().includes(search));

      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">No se encontraron tecnicos</div>';
        return;
      }

      filtered.forEach(t => {
        const item = el('label', { className: 'checkbox-item' }, [
          el('input', { type: 'checkbox', value: t.id, 'data-tech-id': t.id }),
          document.createTextNode(`${t.nombre} (${t.dealer_name})`),
        ]);
        container.appendChild(item);
      });
    }

    async function sendInvites() {
      const checked = document.querySelectorAll('#technicianCheckboxes input[type="checkbox"]:checked');
      const ids = Array.from(checked).map(cb => parseInt(cb.value));
      if (ids.length === 0) {
        showAlert('inviteAlert', 'Seleccione al menos un tecnico', 'warning');
        return;
      }

      try {
        const result = await apiPost('invite.php', { session_id: inviteSessionId, technician_ids: ids });
        showAlert('inviteAlert', result.message, 'success');
        setTimeout(() => closeModal('inviteModal'), 1500);
      } catch (err) {
        showAlert('inviteAlert', err.message, 'danger');
      }
    }

    // ── View Invites ──
    async function viewInvites(sessionId, courseName) {
      document.getElementById('viewInvitesTitle').textContent = `Invitados - ${courseName}`;
      const tbody = document.getElementById('invitesTable');
      tbody.innerHTML = '<tr><td colspan="4">Cargando...</td></tr>';
      openModal('viewInvitesModal');

      try {
        const invites = await apiGet(`invite.php?session_id=${sessionId}`);
        tbody.innerHTML = '';

        if (invites.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Sin invitaciones</td></tr>';
          return;
        }

        invites.forEach(inv => {
          const confirmed = inv.dealer_confirmed == 1;
          const attStatus = inv.attendance_status || '—';
          const tr = el('tr', {}, [
            el('td', { textContent: inv.technician_name }),
            el('td', { textContent: inv.dealer_name }),
            el('td', {}, [
              el('span', {
                className: `badge ${confirmed ? 'badge-success' : 'badge-warning'}`,
                textContent: confirmed ? 'Confirmado' : 'Pendiente',
              }),
            ]),
            el('td', {}, [
              el('span', {
                className: `badge ${attStatus === 'PRESENTE' ? 'badge-success' : attStatus === 'AUSENTE' ? 'badge-danger' : 'badge-info'}`,
                textContent: attStatus,
              }),
            ]),
          ]);
          tbody.appendChild(tr);
        });
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="4">${err.message}</td></tr>`;
      }
    }
  </script>
</body>
</html>
