<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training - Migracion/Historico (Corporativo)</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-wrap">
      <header class="header" id="header"></header>
      <main class="content">
        <div id="alertBox" class="alert"></div>

        <!-- Import Form -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Importar Registro Historico</h2>
          </div>
          <div class="card-body">
            <form id="formImport" autocomplete="off">
              <div class="form-row">
                <div class="form-group">
                  <label for="technicianId">Tecnico</label>
                  <select id="technicianId" class="form-control" required>
                    <option value="">Seleccionar tecnico...</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="courseName">Nombre del Curso</label>
                  <input type="text" id="courseName" class="form-control" placeholder="Ej: Introduccion a Sistemas Changan" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="trainingDate">Fecha de Capacitacion</label>
                  <input type="date" id="trainingDate" class="form-control">
                </div>
                <div class="form-group">
                  <label for="result">Resultado</label>
                  <select id="result" class="form-control">
                    <option value="">Sin resultado</option>
                    <option value="Aprobado">Aprobado</option>
                    <option value="Reprobado">Reprobado</option>
                    <option value="En curso">En curso</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="certificateFile">Ruta de Certificado (opcional)</label>
                  <input type="text" id="certificateFile" class="form-control" placeholder="Ej: /uploads/cert_001.pdf">
                </div>
              </div>
              <button type="submit" class="btn btn-primary">Importar Registro</button>
            </form>
          </div>
        </div>

        <!-- History Table -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Registros Historicos Importados</h2>
            <button class="btn btn-outline btn-sm" onclick="loadHistory()">Actualizar</button>
          </div>
          <div class="card-body">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Tecnico</th>
                    <th>Dealer</th>
                    <th>Curso</th>
                    <th>Fecha</th>
                    <th>Resultado</th>
                    <th>Certificado</th>
                    <th>Importado</th>
                  </tr>
                </thead>
                <tbody id="historyTable">
                  <tr><td colspan="7" class="empty-state">Cargando...</td></tr>
                </tbody>
              </table>
            </div>
            <div class="pagination" id="historyPagination"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="../assets/js/app.js"></script>
  <script>
    let allHistory = [];
    let historyPage = 1;

    document.addEventListener('DOMContentLoaded', async () => {
      initPage('ADMIN_MASTER', ['Training', 'Migracion / Historico'], 'Admin Corporativo');
      await loadTechnicians();
      loadHistory();
      document.getElementById('formImport').addEventListener('submit', importRecord);
    });

    async function loadTechnicians() {
      try {
        const techs = await apiGet('technicians.php');
        const sel = document.getElementById('technicianId');
        techs.forEach(t => {
          sel.appendChild(el('option', {
            value: t.id,
            textContent: `${t.nombre} (${t.dealer_name})`,
          }));
        });
      } catch (e) { console.error(e); }
    }

    async function importRecord(e) {
      e.preventDefault();
      const body = {
        technician_id: parseInt(document.getElementById('technicianId').value),
        course_name: document.getElementById('courseName').value,
        training_date: document.getElementById('trainingDate').value || null,
        result: document.getElementById('result').value || null,
        certificate_file: document.getElementById('certificateFile').value || null,
      };

      try {
        await apiPost('history.php', body);
        showAlert('alertBox', 'Registro historico importado correctamente', 'success');
        document.getElementById('formImport').reset();
        loadHistory();
      } catch (err) {
        showAlert('alertBox', err.message, 'danger');
      }
    }

    async function loadHistory() {
      try {
        allHistory = await apiGet('history.php');
        renderHistory(1);
      } catch (err) {
        document.getElementById('historyTable').innerHTML = `<tr><td colspan="7" class="empty-state">${err.message}</td></tr>`;
      }
    }

    function renderHistory(page) {
      historyPage = page;
      const { items, totalPages } = paginate(allHistory, page, 10);
      const tbody = document.getElementById('historyTable');
      tbody.innerHTML = '';

      if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Sin registros historicos</td></tr>';
        document.getElementById('historyPagination').innerHTML = '';
        return;
      }

      items.forEach(h => {
        const hasCert = h.certificate_file ? 'Si' : 'No';
        const tr = el('tr', {}, [
          el('td', { textContent: h.technician_name || `ID ${h.technician_id}` }),
          el('td', { textContent: h.dealer_name || '—' }),
          el('td', { textContent: h.course_name }),
          el('td', { textContent: formatDate(h.training_date) }),
          el('td', {}, [
            el('span', {
              className: `badge ${h.result === 'Aprobado' ? 'badge-success' : h.result === 'Reprobado' ? 'badge-danger' : 'badge-info'}`,
              textContent: h.result || '—',
            }),
          ]),
          el('td', { textContent: hasCert }),
          el('td', { textContent: formatDateTime(h.created_at) }),
        ]);
        tbody.appendChild(tr);
      });

      renderPagination('historyPagination', totalPages, page, renderHistory);
    }
  </script>
</body>
</html>
